<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 458 E-Learning Slide</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: #0e1726;
    }

    body {
      position: relative;
    }

    #sl-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(37, 99, 235, 0.18), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(249, 115, 22, 0.18), transparent 24%),
        linear-gradient(135deg, #08111f 0%, #10233d 52%, #0c1a2b 100%);
    }

    #sl-stage {
      width: 1920px;
      height: 1080px;
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
      overflow: hidden;
      color: #e8eef8;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
        linear-gradient(135deg, #0b1730 0%, #11284a 38%, #0c1b2f 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.35));
      pointer-events: none;
    }

    .panel {
      background: rgba(9, 19, 35, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.25),
        0 0 0 1px rgba(255,255,255,0.02) inset;
      backdrop-filter: blur(10px);
    }

    .soft-line {
      border-color: rgba(148, 163, 184, 0.18);
    }

    .glow-dot {
      box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.12), 0 0 20px rgba(249, 115, 22, 0.3);
    }

    .step-btn.active {
      background: rgba(255, 255, 255, 0.05);
      color: inherit;
      border-color: rgba(255,255,255,0.18);
      box-shadow: none;
      transform: none;
    }

    .step-btn.done::after {
      content: "";
      position: absolute;
      inset: auto 14px 12px auto;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .hotspot {
      position: absolute;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.92);
      background: rgba(249, 115, 22, 0.95);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 0 0 10px rgba(249, 115, 22, 0.14);
      animation: pulse 2.2s infinite;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      transform: scale(1.08);
      box-shadow: 0 0 0 14px rgba(249, 115, 22, 0.2);
      outline: none;
    }

    .hotspot.completed {
      background: rgba(34, 197, 94, 0.95);
      box-shadow: 0 0 0 10px rgba(34, 197, 94, 0.14);
      animation: none;
    }

    .callout-line {
      position: absolute;
      background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0.18));
      height: 3px;
      transform-origin: left center;
      border-radius: 999px;
      opacity: 0.88;
    }

    .callout-box {
      position: absolute;
      max-width: 310px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(6, 14, 28, 0.88);
      border: 1px solid rgba(255,255,255,0.14);
      color: #f8fafc;
      box-shadow: 0 20px 36px rgba(0,0,0,0.3);
    }

    .reveal {
      animation: riseIn 0.6s ease both;
    }

    .progress-fill {
      transition: width 0.35s ease;
    }

    .fade-panel {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .reference-image {
      object-fit: cover;
      object-position: center;
      filter: saturate(1.03) contrast(1.02);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.9; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    header {
      animation: slideInLeft 0.7s ease 0.1s both;
    }

    main {
      animation: slideInRight 0.7s ease 0.15s both;
    }

    section.panel {
      animation: riseIn 0.6s ease 0.3s both;
    }

    aside {
      animation: slideInRight 0.7s ease 0.25s both;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .image-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .image-modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(249, 115, 22, 0.4);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .image-modal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      display: flex !important;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.9) !important;
      border: 2px solid rgba(255, 255, 255, 0.8) !important;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 10001 !important;
      padding: 0 !important;
    }

    .image-modal-close:hover {
      background: rgba(0, 0, 0, 0.95) !important;
      border-color: rgba(255, 255, 255, 0.95) !important;
    }

    .image-modal-close svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full">
  <div id="sl-wrapper" class="h-full w-full">
   <div id="sl-stage" aria-label="Interactive training slide for Code 458">
    <div class="grid-overlay"></div>
    <header class="absolute left-0 top-0 w-full px-16 pt-12">
     <div>
      <h1 class="text-[54px] font-black leading-[1.04] tracking-tight text-white">458 Insuf Clr between Insul &amp; CIP Wires</h1>
      <div class="mt-4 w-80">
       <img src="https://raw.githubusercontent.com/pushkapatrick-design/ancillary-providers/main/Screenshot%202026-02-24%20134104.png" alt="Code 458 reference diagram" class="w-full rounded-lg border border-orange-400/30" loading="lazy" onerror="console.error('Image failed to load:', this.src); this.style.background='#1e293b'; this.alt='Image unavailable';">
      </div>
     </div>
    </header>
    <main class="absolute left-0 top-[240px] w-full px-16 pb-14">
     <div class="grid grid-cols-[720px_1fr] gap-6">
      <section class="relative h-[760px] w-[720px]">
       <div class="panel relative h-full overflow-hidden rounded-[34px]">
        <div id="imageContainer" class="absolute inset-6 overflow-hidden rounded-[26px] border border-white/10 bg-slate-900 cursor-pointer hover:border-orange-400/40 transition">
         <img id="mainImage" src="https://raw.githubusercontent.com/pushkapatrick-design/OH-CMP-Mod-4-Code-458-/main/code%20458.png" alt="Reference visual for Code 458 inspection points on a utility pole" class="reference-image h-full w-full">
        </div>
       </div>
      </section>
      <section class="panel h-[760px] overflow-hidden rounded-[30px] p-5">
       <div id="stepList" class="space-y-3 overflow-y-auto h-full">
       </div>
      </section>
     </div>
    </main>
   </div>
  </div>
  <div id="imageModal" class="image-modal">
   <div class="image-modal-content">
    <img id="expandedImage" src="" alt="Expanded reference image"> <button id="closeImageModal" class="image-modal-close" aria-label="Close expanded image"> <i data-lucide="x" style="width: 24px; height: 24px;"></i> </button>
   </div>
  </div>
  <script>
    const steps = [
      {
        title: "Pole clearance between Secondary and CIP",
        eyebrow: "Step 1 • Pole",
        icon: "ruler",
        body: "Use Code 458 when the clearance at the pole between the Secondary and CIP is less than 6 feet. If the clearance from a triplex secondary is less than 4 feet at the pole, a guard arm is required.",
        location: "Pole",
        short: "Check pole clearance between Secondary and CIP.",
        status: "Pole clearance reviewed"
      },
      {
        title: "Mid-span clearance with triplex secondary",
        eyebrow: "Step 2 • Midspan",
        icon: "move-horizontal",
        body: "Next, check the clearance in mid-span with the triplex secondary. Confirm the location as midspan and capture the condition details clearly.",
        location: "Midspan",
        short: "Check mid-span clearance with triplex secondary.",
        status: "Midspan reviewed"
      },
      {
        title: "Primary insulated cable riser opening",
        eyebrow: "Step 3 • Riser opening",
        icon: "cable",
        body: "Then, check the clearance from the primary insulated cable riser opening. Review the spacing and note the CIP name, measurement, and description.",
        location: "Pole / Riser opening",
        short: "Check clearance from the primary insulated cable riser opening.",
        status: "Primary riser opening reviewed"
      },
      {
        title: "Secondary insulated cable riser opening",
        eyebrow: "Step 4 • Riser opening",
        icon: "git-branch-plus",
        body: "Next, check the clearance from the secondary insulated cable riser opening. Make sure the report identifies the exact location and the measured condition.",
        location: "Pole / Riser opening",
        short: "Check clearance from the secondary insulated cable riser opening.",
        status: "Secondary riser opening reviewed"
      },
      {
        title: "Weather head triplex clearance",
        eyebrow: "Step 5 • Weatherhead",
        icon: "cloud-lightning",
        body: "Finally, check the clearance at the weather head triplex. Record weatherhead as the location when applicable, along with the CIP name, measurement, and description.",
        location: "Weatherhead",
        short: "Check clearance at the weather head triplex.",
        status: "Weatherhead reviewed"
      }
    ];

    const stepList = document.getElementById("stepList");

    let currentStep = -1;
    let completed = new Set();

    function renderStepList() {
      stepList.innerHTML = "";
      steps.forEach((step, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "step-btn relative w-full rounded-[22px] border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:bg-white/10 focus:outline-none focus:ring-4 focus:ring-orange-300/30";
        button.setAttribute("data-index", index);
        button.innerHTML = `
          <div class="flex items-start gap-4">
            <div class="mt-1 flex h-10 w-10 items-center justify-center rounded-2xl bg-orange-500 text-[18px] font-black text-white">${index + 1}</div>
            <div>
              <p class="text-[16px] uppercase tracking-[0.18em] text-slate-400">${step.eyebrow}</p>
              <p class="mt-2 text-[24px] font-bold leading-snug text-orange-300">${step.title}</p>
              <p class="mt-2 text-[19px] text-slate-300">${step.short}</p>
            </div>
          </div>
        `;
        button.addEventListener("click", () => activateStep(index));
        stepList.appendChild(button);
      });
      updateVisualState();
    }

    function activateStep(index) {
      currentStep = index;
      completed.add(index);
      updateVisualState();
    }

    function updateVisualState() {
      const stepButtons = document.querySelectorAll(".step-btn");
      stepButtons.forEach((btn, index) => {
        btn.classList.toggle("active", index === currentStep);
        btn.classList.toggle("done", completed.has(index));
      });

      const hotspots = document.querySelectorAll(".hotspot");
      hotspots.forEach((hotspot) => {
        const index = Number(hotspot.getAttribute("data-step"));
        hotspot.classList.toggle("completed", completed.has(index));
        hotspot.style.opacity = currentStep === -1 || currentStep === index ? "1" : "0.92";
      });
    }

    document.querySelectorAll(".hotspot").forEach((hotspot) => {
      hotspot.addEventListener("click", () => {
        const index = Number(hotspot.getAttribute("data-step"));
        activateStep(index);
      });
    });

    function scaleStage() {
      const wrapper = document.getElementById("sl-wrapper");
      const stage = document.getElementById("sl-stage");
      const iframeW = wrapper.clientWidth;
      const iframeH = wrapper.clientHeight;
      const scale = Math.min(iframeW / 1920, iframeH / 1080);

      const scaledW = 1920 * scale;
      const scaledH = 1080 * scale;
      const left = (iframeW - scaledW) / 2;
      const top = (iframeH - scaledH) / 2;

      stage.style.transform = "translate(" + left + "px, " + top + "px) scale(" + scale + ")";
    }

    const resizeObserver = new ResizeObserver(() => {
      scaleStage();
    });
    resizeObserver.observe(document.getElementById("sl-wrapper"));

    // Image modal functionality
    const imageContainer = document.getElementById("imageContainer");
    const mainImage = document.getElementById("mainImage");
    const imageModal = document.getElementById("imageModal");
    const expandedImage = document.getElementById("expandedImage");
    const closeImageModal = document.getElementById("closeImageModal");

    imageContainer.addEventListener("click", () => {
      expandedImage.src = mainImage.src;
      imageModal.classList.add("active");
      document.body.style.overflow = "hidden";
    });

    closeImageModal.addEventListener("click", () => {
      imageModal.classList.remove("active");
      document.body.style.overflow = "";
    });

    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) {
        imageModal.classList.remove("active");
        document.body.style.overflow = "";
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && imageModal.classList.contains("active")) {
        imageModal.classList.remove("active");
        document.body.style.overflow = "";
      }
    });

    renderStepList();
    scaleStage();
    lucide.createIcons();
  </script>
